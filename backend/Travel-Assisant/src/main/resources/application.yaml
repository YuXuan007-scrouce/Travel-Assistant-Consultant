server:
  port: 8018
  servlet:
    encoding:
      enabled: true
      force: true
      charset: UTF-8

spring:
  application:
    name: ChatApplication

  ai:
    dashscope:
      api-key: ${API-KEY}
      chat:
        options:
          model: qwen-max
      embedding:
        options:
          model: text-embedding-v3
    retry:
      max-attempts: 3     # 最大重试 3次
      backoff:
        initial-interval: 500
        multiplier: 2
        max-interval: 3000
      on-http-codes: 429,500,503
    vectorstore:
      redis:
        initialize-schema: true
        index-name: TA-index
        prefix: "travel:rag:chunk:"

  data:
    redis:
      client-type: jedis
      port: 16379
      host: localhost
      database: 1
      connect-timeout: 3000
      timeout: 2000

  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:mysql://localhost:13306/Travel?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=GMT%2b8
    username: root
    password: 123456CD
    hikari:
      connection-test-query: SELECT 1
      connection-timeout: 60000
      idle-timeout: 500000
      max-lifetime: 540000
      maximum-pool-size: 12
      minimum-idle: 10
      pool-name: SPHHikariPool

logging:
  level:
    org.springframework.ai: debug    # ✅ 新增，看AI请求详情
    com.alibaba.cloud.ai: debug
    org.springframework.web.client.RestTemplate: debug